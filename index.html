<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Coffee shop</title>
</head>
<body>
    <!-- aqui va el header -->
     <header>
        <nav class="navbar">
            <a href="#" class="nav-logo">
                <h2 class="nav text"> ☕ Coffee</h2>

            </a>
           
            <!-- check box invisible: controla el menu movil -->

            <input type="checkbox" id="menu-toggle" class="menu-toggle">

            <!-- menu de navegacion -->
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="./index.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="./menu.html" class="nav-link">Menu</a>
                </li>
                <li class="nav-item">
                    <a href="./galeria.html" class="nav-link">Galeria</a>
                </li>
                <li class="nav-item">
                    <a href="./contactenos.html" class="nav-link">contactenos</a>
                </li>
            </ul>
            <!-- Acciones: icono usuario + boton hamburguesa -->
            <div class="nav-actions">
                <a href="./login.html" class="nav-login" title="Iniciar sesion">
                    <i class="fa-regular fa-user"></i>
                </a>
                <!-- label vinculado al checkbox: actua como boton hamburguesa -->
                 <label for="menu-toggle" class="hamburguer">
                    <span></span>
                    <span></span>
                    <span></span>

                 </label>
            </div>

        </nav>
     </header>

     <main>
        <section class="hero-section">
            <div class="section-content">

                <!-- columna izquierda: texto -->
                <div class="hero-details">
                    <h2 class="title">El mejor cafe</h2>
                    <h3 class="subtitle">
                        Haz tu dia genial con nuestro especial Coffee
                    </h3>
                    <p class="description">
                        Bienvenido a nuestro paraiso del cafe, donde cada grano cuenta una historia y cada taza despierta una alegria
                    </p>
                    <div class="buttons">
                        <a href="#" class="button order-now">Ordenar ahora</a>
                        <a href="#" class="button contact-us">contactenos</a>
                    </div>
                </div>

                <!-- columna derecha: imagen -->
                <div class="hero-image-wrapper">
                    <img src="img/coffee-hero-section.png" alt="hero" class="hero-image"> 

                </div>

            </div>

        </section>
     </main>
    
</body>
</html>
